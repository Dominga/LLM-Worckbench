<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>LLM Workbench — Chat workspace explorations</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#f0eee9; overflow:hidden; }
  body { font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { height:100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="v1-forge.jsx"></script>
<script type="text/babel" src="v2-stack.jsx"></script>
<script type="text/babel" src="v3-atelier.jsx"></script>
<script type="text/babel" src="v4-lattice.jsx"></script>
<script type="text/babel" src="v5-servers.jsx"></script>
<script type="text/babel" src="v5-loom.jsx"></script>

<script type="text/babel">
const W = 1280, H = 820;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="merged" title="V5 · Loom — merged direction"
        subtitle="V3 layout (top tabs, single sidebar) + V1 blue palette + V4 status pills in the top bar.">
        <DCArtboard id="v5-loom" label="V5 · Loom" width={1280} height={820}>
          <V5App/>
        </DCArtboard>
      </DCSection>
      <DCSection id="chat-workspace" title="Chat workspace — earlier studies"
        subtitle="Source explorations the merge draws from.">
        <DCArtboard id="v1-forge"   label="V1 · Forge — VS Code shell, blue, comfortable" width={W} height={H}>
          <V1App/>
        </DCArtboard>
        <DCArtboard id="v2-stack"   label="V2 · Stack — compact terminal, green" width={W} height={H}>
          <V2App/>
        </DCArtboard>
        <DCArtboard id="v3-atelier" label="V3 · Atelier — top tabs, amber, cozy app feel" width={W} height={H}>
          <V3App/>
        </DCArtboard>
        <DCArtboard id="v4-lattice" label="V4 · Lattice — dual sidebars + inspector, purple" width={W} height={H}>
          <V4App/>
        </DCArtboard>
        <DCPostIt top={-30} left={W * 4 + 200} rotate={-3} width={210}>
          Same conversation, four shells. V1/V2 lean IDE; V3 leans app; V4 trades the bottom panel for a right-side inspector.
        </DCPostIt>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
