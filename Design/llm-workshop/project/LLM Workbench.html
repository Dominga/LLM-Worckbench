<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>LLM Workbench — Workspace Explorations</title>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="v1-forge.jsx"></script>
<script type="text/babel" src="v2-stack.jsx"></script>
<script type="text/babel" src="v3-atelier.jsx"></script>
<script type="text/babel" src="v4-mono.jsx"></script>
<script type="text/babel" src="v5-servers.jsx"></script>
<script type="text/babel" src="v5-loom.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const W = 1280, H = 800;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="workspace"
          title="LLM Workbench — Chat / Agent Workspace"
          subtitle="Hybrid VS Code-style shell · Windows/Linux chrome · 4 layout + density + accent variations">
          <DCArtboard id="v1" label="V1 · Forge — comfortable, blue accent" width={W} height={H}>
            <V1App/>
          </DCArtboard>
          <DCArtboard id="v2" label="V2 · Stack — compact, terminal-feel, green" width={W} height={H}>
            <V2App/>
          </DCArtboard>
          <DCArtboard id="v3" label="V3 · Atelier — top-tabs workspace, amber, cozy" width={W} height={H}>
            <V3App/>
          </DCArtboard>
          <DCArtboard id="v4" label="V4 · Mono — high-contrast, sharp 1px, violet" width={W} height={H}>
            <V4App/>
          </DCArtboard>
          <DCArtboard id="v5" label="V5 · Loom — synthesis · click Servers tab" width={W} height={H}>
            <V5App/>
          </DCArtboard>
          <DCPostIt top={-46} left={W * 4 + 200} rotate={2}>
            Click any card's ⤢ to focus fullscreen · ←/→ between artboards · click tool-call rows to expand
          </DCPostIt>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
