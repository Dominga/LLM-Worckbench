name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            tags: webkit2_41,sqlite_fts5
            artifact: llm-workbench-linux-amd64
            binpath: llm-workbench/build/bin/llm-workbench
          - os: windows-latest
            platform: windows/amd64
            tags: sqlite_fts5
            artifact: llm-workbench-windows-amd64
            binpath: llm-workbench/build/bin/llm-workbench.exe
    defaults:
      run:
        shell: bash
        working-directory: llm-workbench
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        # libsqlite3-dev: provides sqlite3.h, needed to compile the sqlite-vec
        # cgo binding (it #includes "sqlite3.h"). Preinstalled on ubuntu-latest
        # but pinned here so the build doesn't silently depend on the runner image.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config libsqlite3-dev

      - name: Provide sqlite3.h for cgo (Windows)
        if: runner.os == 'Windows'
        # Windows runners ship no sqlite3.h; the sqlite-vec cgo binding needs it.
        # Drop in the official SQLite amalgamation header and put its dir on
        # CGO_CFLAGS (forward slashes — mingw gcc dislikes backslash -I paths).
        shell: pwsh
        run: |
          $url = 'https://www.sqlite.org/2024/sqlite-amalgamation-3470200.zip'
          $zip = Join-Path $env:RUNNER_TEMP 'sqlite-amalgamation.zip'
          $dst = Join-Path $env:RUNNER_TEMP 'sqlite-amalgamation'
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dst -Force
          $inc = (Get-ChildItem -Path $dst -Recurse -Filter sqlite3.h | Select-Object -First 1).DirectoryName -replace '\\','/'
          "CGO_CFLAGS=-I$inc" | Add-Content -Path $env:GITHUB_ENV
          Write-Host "sqlite3.h include dir: $inc"

      - uses: actions/setup-go@v6
        with:
          go-version-file: llm-workbench/go.mod
          cache-dependency-path: llm-workbench/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: llm-workbench/frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build
        # CGo on (required by go-sqlite3 / sqlite_fts5). Native toolchain on each runner:
        # gcc on Ubuntu, bundled mingw-w64 on windows-latest. No cross-compiling.
        run: wails build -tags "${{ matrix.tags }}" -platform ${{ matrix.platform }}

      - uses: actions/upload-artifact@v7
        # PRs run as a compile check only — no binaries published.
        if: github.event_name != 'pull_request'
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binpath }}
          if-no-files-found: error
