name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            tags: webkit2_41,sqlite_fts5
            artifact: llm-workbench-linux-amd64
            binpath: llm-workbench/build/bin/llm-workbench
          - os: windows-latest
            platform: windows/amd64
            tags: sqlite_fts5
            artifact: llm-workbench-windows-amd64
            binpath: llm-workbench/build/bin/llm-workbench.exe
    defaults:
      run:
        shell: bash
        working-directory: llm-workbench
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebKit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version-file: llm-workbench/go.mod
          cache-dependency-path: llm-workbench/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: llm-workbench/frontend/package-lock.json

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build
        # CGo on (required by go-sqlite3 / sqlite_fts5). Native toolchain on each runner:
        # gcc on Ubuntu, bundled mingw-w64 on windows-latest. No cross-compiling.
        run: wails build -tags "${{ matrix.tags }}" -platform ${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binpath }}
          if-no-files-found: error
